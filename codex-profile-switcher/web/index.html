<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex Profile Dashboard</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Codex Profile Dashboard</h1>
          <p id="sync-status">正在读取账号状态</p>
        </div>
        <button id="refresh" type="button">刷新</button>
      </header>

      <section class="metrics" aria-label="本地使用情况">
        <div>
          <span class="label">本地线程</span>
          <strong id="thread-count">-</strong>
        </div>
        <div>
          <span class="label">历史 token</span>
          <strong id="history-tokens">-</strong>
        </div>
        <div>
          <span class="label">最新输入</span>
          <strong id="input-tokens">-</strong>
        </div>
        <div>
          <span class="label">缓存命中</span>
          <strong id="cached-tokens">-</strong>
        </div>
        <div>
          <span class="label">最新输出</span>
          <strong id="output-tokens">-</strong>
        </div>
      </section>

      <section>
        <div class="section-head">
          <h2>账号</h2>
          <span id="profile-root"></span>
        </div>
        <div id="profiles" class="profile-grid"></div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
